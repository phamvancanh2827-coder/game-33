<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieko Quiz - Bài 53: Ý Định Của Chúng Mình</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      * { box-sizing: border-box; }
      .safe-game-wrapper {
        background-color: #1a1a1a; padding: 20px 0; border-radius: 16px; margin: 20px 0;
        display: flex; justify-content: center; align-items: center;
      }
      ruby { ruby-align: center; }
      @keyframes mario-jump {
        0% { transform: translateY(0) scale(1); }
        30% { transform: translateY(-130px) scale(1.05); }
        60% { transform: translateY(-130px) scale(1.05); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes obstacle-slide {
        0% { transform: translateX(200px); opacity: 1; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateX(-50px); opacity: 0; }
      }
      .animate-mario-jump { animation: mario-jump 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
      .animate-obstacle-slide { animation: obstacle-slide 1.2s linear forwards; }
      .game-btn { box-shadow: 0px 6px 0px rgba(0,0,0,0.3); transition: all 0.1s; }
      .game-btn:active:not(:disabled) { box-shadow: 0px 0px 0px rgba(0,0,0,0.3); transform: translateY(6px); }
      .dialog-box { box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3), inset 4px 4px 0px rgba(255,255,255,0.3), 8px 8px 0px rgba(0,0,0,0.5); }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="safe-game-wrapper">
        <div id="root" class="w-full"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const quizData = [
          // TỪ VỰNG (20 CÂU)
          { q: 'Từ vựng: "{夏休|なつやす}み" nghĩa là gì?', options: ["Nghỉ hè", "Nghỉ xuân", "Ngày lễ", "Kỳ nghỉ"], a: 0 },
          { q: 'Từ vựng: "{工作|こうさく}" nghĩa là gì?', options: ["Đồ thủ công", "Bài tập", "Vẽ tranh", "Nấu ăn"], a: 0 },
          { q: 'Từ vựng: "Cái ghế" tiếng Nhật là gì?', options: ["いす", "つくえ", "ふで", "ペン"], a: 0 },
          { q: 'Từ vựng: "{作|さく}ひんてん" nghĩa là gì?', options: ["Triển lãm tác phẩm", "Buổi hòa nhạc", "Cuộc thi thể thao", "Lễ hội hè"], a: 0 },
          { q: 'Từ vựng: "Vỏ hộp sữa" tiếng Nhật là gì?', options: ["{牛|ぎゅう}にゅうパック", "ペットボトル", "おり{紙|がみ}", "ダンボール"], a: 0 },
          { q: 'Từ vựng: "Ống cắm bút" tiếng Nhật là gì?', options: ["ペン{立|た}て", "えんぴつけずり", "ふでばこ", "ノート"], a: 0 },
          { q: 'Từ vựng: "Bức tranh" tiếng Nhật là gì?', options: ["え", "うた", "しゃしん", "じしょ"], a: 0 },
          { q: 'Từ vựng: "{海|うみ}" nghĩa là gì?', options: ["Biển", "Núi", "Sông", "Công viên"], a: 0 },
          { q: 'Từ vựng: "Dự định/Ý định" tiếng Nhật là gì?', options: ["つもり", "きもち", "いみ", "よてい"], a: 0 },
          { q: 'Từ vựng: "Nghĩ/Tưởng" tiếng Nhật là gì?', options: ["{思|おも}います", "いいます", "しらべます", "わすれます"], a: 0 },
          { q: 'Từ vựng: "Làm/Chế tạo" tiếng Nhật là gì?', options: ["{作|つく}ります", "だします", "かきます", "おぼえます"], a: 0 },
          { q: 'Từ vựng: "Hôm nay" tiếng Nhật là gì?', options: ["きょう", "あした", "きのう", "こんしゅう"], a: 0 },
          { q: 'Từ vựng: "Tuần sau" tiếng Nhật là gì?', options: ["{来週|らいしゅう}", "{先週|せんしゅう}", "{今週|こんしゅう}", "{毎日|まいにち}"], a: 0 },
          { q: 'Từ vựng: "Chủ nhật" tiếng Nhật là gì?', options: ["{日曜日|にちようび}", "{月曜日|げつようび}", "{火曜日|かようび}", "{土曜日|どようび}"], a: 0 },
          { q: 'Từ vựng: "Nhớ/Ghi nhớ" tiếng Nhật là gì?', options: ["{覚|おぼ}えます", "{忘|わす}れます", "{教|おし}えます", "{調|しら}べます"], a: 0 },
          { q: 'Từ vựng: "Hết/Kết thúc" tiếng Nhật là gì?', options: ["{終|お}わります", "{始|はじ}まります", "{帰|かえ}ります", "{休|やす}みます"], a: 0 },
          { q: 'Từ vựng: "Cùng nhau" tiếng Nhật là gì?', options: ["いっしょに", "たぶん", "きっと", "もう"], a: 0 },
          { q: 'Từ vựng: "Rất/Lắm" tiếng Nhật là gì?', options: ["とても", "すこし", "あまり", "ぜんぜん"], a: 0 },
          { q: 'Từ vựng: "Vẽ (tranh)" tiếng Nhật là gì?', options: ["かきます", "ききます", "ひきます", "ふきます"], a: 0 },
          { q: 'Từ vựng: "Tất cả" tiếng Nhật là gì?', options: ["ぜんぶ", "みんな", "どこか", "なにか"], a: 0 },

          // NGỮ PHÁP (40 CÂU)
          { q: 'Chia Thể ý định: "{作|つく}る" (Nhóm 1)', options: ["{作|つく}ろう", "{作|つく}りよう", "{作|つく}ろ", "{作|つく}れ"], a: 0 },
          { q: 'Chia Thể ý định: "{書|か}く" (Nhóm 1)', options: ["{書|か}こう", "{書|か}きよう", "{書|か}け", "{書|か}くう"], a: 0 },
          { q: 'Chia Thể ý định: "{行|い}く" (Nhóm 1)', options: ["{行|い}こう", "{行|い}きよう", "{行|い}こ", "{行|い}け"], a: 0 },
          { q: 'Chia Thể ý định: "{帰|かえ}る" (Nhóm 1)', options: ["{帰|かえ}ろう", "{帰|かえ}りよう", "{帰|かえ}ろ", "{帰|かえ}れ"], a: 0 },
          { q: 'Chia Thể ý định: "{遊|あそ}ぶ" (Nhóm 1)', options: ["{遊|あそ}ぼう", "{遊|あそ}びよう", "{遊|あそ}ぼ", "{遊|あそ}べ"], a: 0 },
          { q: 'Chia Thể ý định: "{待|ま}つ" (Nhóm 1)', options: ["{待|ま}とう", "{待|ま}ちよう", "{待|ま}て", "{待|ま}と"], a: 0 },
          { q: 'Chia Thể ý định: "{飲|の}む" (Nhóm 1)', options: ["{飲|の}もう", "{飲|の}みよう", "{飲|の}も", "{飲|の}め"], a: 0 },
          { q: 'Chia Thể ý định: "{話|はな}す" (Nhóm 1)', options: ["{話|はな}そう", "{話|はな}しよう", "{話|はな}せ", "{話|はな}そ"], a: 0 },
          { q: 'Chia Thể ý định: "{食|た}べる" (Nhóm 2)', options: ["{食|た}べよう", "{食|た}べろう", "{食|た}べろ", "{食|た}べようう"], a: 0 },
          { q: 'Chia Thể ý định: "{起|お}きる" (Nhóm 2)', options: ["{起|お}きよう", "{起|お}きろう", "{起|お}きろ", "{起|お}きようう"], a: 0 },
          { q: 'Chia Thể ý định: "{覚|おぼ}える" (Nhóm 2)', options: ["{覚|おぼ}えよう", "{覚|おぼ}えろう", "{覚|おぼ}えろ", "{覚|おぼ}え"], a: 0 },
          { q: 'Chia Thể ý định: "{開|あ}ける" (Nhóm 2)', options: ["{開|あ}けよう", "{開|あ}けろう", "{開|あ}けろ", "{開|あ}け"], a: 0 },
          { q: 'Chia Thể ý định: "する" (Nhóm 3)', options: ["しよう", "すよう", "しろう", "しろ"], a: 0 },
          { q: 'Chia Thể ý định: "くる" (Nhóm 3)', options: ["こよう", "きよう", "くるよう", "こい"], a: 0 },
          { q: 'Điền từ: 「いっしょに {帰|かえ}らない？」「うん、______。」', options: ["{帰|かえ}ろう", "{帰|かえ}る", "{帰|かえ}ります", "{帰|かえ}ろうか"], a: 0 },
          { q: 'Điền từ: 「あした {作|つく}ろう ______。」', options: ["よ", "ね", "わ", "か"], a: 0 },
          { q: 'Dùng mẫu "Dự định": {土曜日|どようび}に {海|うみ}に ______ と {思|おも}っています。', options: ["{行|い}こう", "{行|い}く", "{行|い}った", "{行|い}き"], a: 0 },
          { q: 'Dùng mẫu "Dự định": ケーキを ______ と {思|おも}っています。', options: ["{作|つく}ろう", "{作|つく}る", "{作|つく}り", "{作|つく}った"], a: 0 },
          { q: 'Dùng mẫu "Dự định": {先生|せんせい}に ______ と {思|おも}っています。', options: ["きこう", "きく", "きき", "きいた"], a: 0 },
          { q: 'Dùng mẫu "Dự định": {今|こん}ばん {早|はや}く ______ と {思|おも}っています。', options: ["ねよう", "ねる", "ね", "ねた"], a: 0 },
          { q: 'Dùng mẫu "Chắc chắn": {明日|あした} プールに {行|い}く ______ です。', options: ["つもり", "おもい", "こと", "もの"], a: 0 },
          { q: 'Dùng mẫu "Chắc chắn" (Phủ định): {明日|あした}は {行|い}かない ______ です。', options: ["つもり", "おもい", "こと", "もの"], a: 0 },
          { q: 'Điền dạng đúng: キャンプの {絵|え}を ______ つもりです。', options: ["だす", "だそう", "だして", "だした"], a: 0 },
          { q: 'Điền dạng đúng: {夏休|なつやす}みに {何|なに}を ______ と {思|おも}っていますか。', options: ["する", "しよう", "した", "し"], a: 0 },
          { q: 'Chọn câu đúng: "Tôi định làm cái ghế bằng vỏ hộp sữa."', options: ["いすを {作|つく}ろうと {思|おmo}っています。", "いすを {作|つく}るつもりです。", "いすを {作|つく}ろうです。", "いすを {作|つく}るです。"], a: 0 },
          { q: 'Ý nghĩa của: "いっしょに {作|つく}ろうよ。"', options: ["Cùng nhau làm đi!", "Tôi sẽ làm một mình.", "Hãy làm giúp tôi.", "Bạn đang làm gì thế?"], a: 0 },
          { q: 'Ý nghĩa của: "{来週|らいしゅう} {引|ひ}っこすんだ。"', options: ["Tuần sau tôi sẽ chuyển nhà.", "Tuần trước tôi đã chuyển nhà.", "Tôi không chuyển nhà.", "Tôi muốn chuyển nhà."], a: 0 },
          { q: 'Ý nghĩa của: "{何|なに}を {出|だ}しますか。"', options: ["Bạn sẽ nộp/đưa ra cái gì?", "Bạn sẽ mua cái gì?", "Bạn sẽ làm cái gì?", "Bạn sẽ ăn cái gì?"], a: 0 },
          { q: 'Chia Thể ý định: "{始|はじ}める" (Nhóm 2)', options: ["{始|はじ}めよう", "{始|はじ}めろう", "{始|はじ}めろ", "{始|はじ}め"], a: 0 },
          { q: 'Chia Thể ý định: "{急|いそ}ぐ" (Nhóm 1)', options: ["{急|いそ}ごう", "{急|いそ}ぎよう", "{急|いそ}げ", "{急|いそ}ご"], a: 0 },
          { q: 'Chia Thể ý định: "{手伝|てつだ}う" (Nhóm 1)', options: ["{手伝|てつだ}おう", "{手伝|てつだ}いよう", "{手伝|てつだ}え", "{手伝|てつだ}お"], a: 0 },
          { q: 'Điền từ: {日曜日||にちようび} ______ ゲームを {考|かんが}えておく。', options: ["までに", "まで", "に", "を"], a: 0 },
          { q: 'Dùng mẫu "Dự định": {日本|にほん}の {本|ほん}を ______ と {思|おも}っています。', options: ["{読|よ}もう", "{読|よ}む", "{読|よ}んで", "{読|よ}んだ"], a: 0 },
          { q: 'Dùng mẫu "Dự định": {友達|ともだち}に ______ と {思|おも}っています。', options: ["あおう", "あう", "あって", "あった"], a: 0 },
          { q: 'Chọn câu phủ định: "Tôi định sẽ không đi biển."', options: ["{海|うみ}へ {行|い}かないつもりです。", "{海|うみ}へ {行|い}こうと {思|おも}いません。", "{海|うみ}へ {行|い}くつもりじゃありません。", "{海|うみ}へ {行|い}かないと {思|おも}います。"], a: 0 },
          { q: 'Dạng đúng: {明日|あした}は {雨|あめ}が ______ と {思|おも}います。', options: ["ふる", "ふろう", "ふり", "ふった"], a: 0 },
          { q: 'Dạng đúng: {宿題|しゅくだい}は もう ______ です。', options: ["だしました", "だす", "だそう", "だした"], a: 0 },
          { q: 'Chia Thể ý định: "{片付|かたづ}ける" (Nhóm 2)', options: ["{片付|かたづ}けよう", "{片付|かたづ}けろう", "{片付|かたづ}けろ", "{片付|かたづ}け"], a: 0 },
          { q: 'Chia Thể ý định: "{乗|の}る" (Nhóm 1)', options: ["{乗|の}ろう", "{乗|の}りよう", "{乗|の}ろ", "{乗|の}れ"], a: 0 },
          { q: 'Điền từ: どこへも {行|い}かない ______ です。', options: ["つもり", "おもい", "こと", "もの"], a: 0 }
        ];

        // --- HÀM STORY ---
        const getStoryContent = (level) => {
            switch(level) {
                case 1: return { title: "CHẶNG 1", desc: "Học cách chia Thể ý định cùng Mieko!", icon: <MushroomSVG width="120" />, bg: "bg-green-600" };
                case 2: return { title: "CHẶNG 2", desc: "Dùng ~ようと思っています để nói về dự định hè!", icon: <CactusSVG width="100" />, bg: "bg-yellow-600" };
                case 3: return { title: "CHẶNG 3", desc: "Khẳng định ý chí với cấu trúc ~つもりです!", icon: <ShellSVG width="120" />, bg: "bg-blue-600" };
                case 4: return { title: "CHẶNG 4", desc: "Ôn tập tổng hợp để hoàn thành bài tập hè!", icon: <RockSVG width="120" />, bg: "bg-gray-600" };
                case 5: return { title: "CHẶNG CUỐI", desc: "Cứu Công chúa và tham gia Triển lãm tác phẩm!", icon: <GhostSVG width="120" />, bg: "bg-indigo-900" };
                default: return { title: "", desc: "", icon: "", bg: "bg-[#5c94fc]" };
            }
        }

        // --- PIXEL ART ICONS ---
        const PixelArt = ({ pixels, colorMap, width = "60" }) => {
           const h = pixels.length; const w = pixels[0].length;
           return (
             <svg width={width} viewBox={`0 0 ${w} ${h}`} className="drop-shadow-[4px_4px_0_rgba(0,0,0,0.5)]" style={{imageRendering: 'pixelated'}}>
               {pixels.map((row, y) => row.split('').map((colorCode, x) => (
                   colorCode !== ' ' && <rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill={colorMap[colorCode]} />
                 )))}
             </svg>
           )
        }

        const MarioSVG = ({ isSad }) => {
          const pixels = ["   RRRRR    ", "  RRRRRRRRR ", "  KKKYYYKY  ", " KYKYYYKYYY ", " KYKYYYKKKK ", " KKKYYYYKKK ", "   YYYYYYY  ", "  RRBRRR    ", " RRRBRRRR   ", "RRRRBBRRRR  ", "YY RBYB R YY", "YYYBBBBBBYYY", "  BBBBBB    ", "  BB  BB    ", " LLL  LLL   ", "LLLL  LLLL  "];
          const colorMap = isSad ? { 'R': '#777', 'Y': '#ccc', 'K': '#333', 'B': '#555', 'L': '#111' } : { 'R': '#E52521', 'Y': '#FFCC99', 'K': '#333333', 'B': '#00439C', 'L': '#5C3A21' }; 
          return <PixelArt pixels={pixels} colorMap={colorMap} width="80" />;
        };

        const HeartSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444', 'W': '#ffffff' }} pixels={[ "  RR  RR  ", " RRRRRRRR ", " RRRWWRRR ", " RRRRRRRR ", "  RRRRRR  ", "   RRRR   ", "    RR    " ]} />;
        const PrincessSVG = ({ width="100" }) => <PixelArt width={width} colorMap={{ 'Y': '#fde047', 'P': '#f472b6', 'S': '#fecdd3', 'E': '#000000', 'R': '#e11d48' }} pixels={[ "   YYYYY   ", "  YYYYYYY  ", "  YYSSSYY  ", "  YSESESY  ", "  YSSRSSY  ", "   SSSSS   ", "   PPPPP   ", "  PPPPPPP  ", "  PPPPPPP  ", " PPPPPPPPP ", "PPPPPPPPPPP", "RRRRRRRRRRR" ]} />;
        const LightbulbSVG = ({ width="20" }) => <PixelArt width={width} colorMap={{ 'Y': '#facc15', 'W': '#ffffff' }} pixels={[ "  YYY  ", " YYYYY ", " YYYYY ", "  YYY  ", "  WWW  ", "  WWW  " ]} />;
        const CrossSVG = ({ width="50" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444' }} pixels={[ " R      R ", "  R    R  ", "   R  R   ", "    RR    ", "   R  R   ", "  R    R  ", " R      R " ]} />;
        const CheckSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'G': '#22c55e' }} pixels={[ "       G  ", "      GG  ", " G   GGG  ", " GG GGG   ", "  GGG     ", "   G      " ]} />;
        const MushroomSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'R': '#E52521', 'W': '#FFFFFF', 'F': '#FFCC99', 'K': '#000000' }} pixels={[ "   RRRR   ", "  RRRRRR  ", " RRRWWRRR ", " RRWWWWWW ", " RRRRRRRR ", "   FFFF   ", "  FFKKFF  ", "   FFFF   " ]} />;
        const CactusSVG = ({width="40"}) => <PixelArt width={width} colorMap={{ 'C': '#22c55e', 'D': '#166534' }} pixels={[ "   CC   ", " C CC   ", " C CC   ", " C CCCC ", " C CC C ", "   CC C ", "   CC   ", "   CC   " ]} />;
        const ShellSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'G': '#16a34a', 'K': '#000000', 'W': '#ffffff' }} pixels={[ "   GGGG   ", " GGGGGGGG ", " GKKGGKKG ", " GGGGGGGG ", "WWWWWWWWWW", " W W  W W " ]} />;
        const RockSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'A': '#64748b', 'B': '#475569' }} pixels={[ "   AAAA   ", "  ABBAAA  ", " AABBAAAA ", " AAAABBAA ", "AAAAAAAAAA" ]} />;
        const GhostSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'W': '#ffffff', 'K': '#000000' }} pixels={[ "  WWWW  ", " WWWWWW ", "WKWKKWWW", "WWWWWWWW", " WWWWWW ", "W W  W W" ]} />;
        const CoinSVG = ({ width="32" }) => (
          <svg viewBox="0 0 24 24" width={width} height={width} className="inline-block animate-spin-slow drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)]"><circle cx="12" cy="12" r="10" fill="#FDE047" stroke="#B45309" strokeWidth="2" /><rect x="10" y="6" width="4" height="12" fill="#B45309" rx="1" /></svg>
        );

        const getObstacleSVG = (level) => {
          switch(level) { case 1: return <MushroomSVG />; case 2: return <CactusSVG />; case 3: return <ShellSVG />; case 4: return <RockSVG />; case 5: return <GhostSVG />; default: return <MushroomSVG />; }
        }

        const playSound = (type) => {
          const AudioContext = window.AudioContext || window.webkitAudioContext; if (!AudioContext) return;
          const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          if (type === 'coin') { osc.type = 'square'; osc.frequency.setValueAtTime(987.77, ctx.currentTime); osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.3); }
          else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3); gain.gain.setValueAtTime(0.2, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.3); }
          else if (type === 'start') { osc.type = 'square'; osc.frequency.setValueAtTime(261.63, ctx.currentTime); osc.frequency.setValueAtTime(523.25, ctx.currentTime + 0.3); gain.gain.setValueAtTime(0.1, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.5); }
        };

        const parseText = (text, isAnswer = false) => {
          if (typeof text !== 'string') return text;
          const parts = text.split(/(\{.*?\})/g);
          return parts.map((part, index) => {
            if (part.startsWith('{') && part.endsWith('}')) {
              const content = part.slice(1, -1); const [kanji, furigana] = content.split('|');
              const colorClass = isAnswer ? "text-white" : "text-black";
              return (
                <ruby key={index} className="mx-[2px] align-baseline">{kanji}<rt className={`text-[0.75em] ${colorClass} font-extrabold tracking-tighter`}>{furigana}</rt></ruby>
              );
            }
            return <span key={index}>{part}</span>;
          });
        };

        function MarioQuiz() {
          const [gameState, setGameState] = useState('start'); 
          const [questions, setQuestions] = useState([]);
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [lives, setLives] = useState(5);
          const [helps, setHelps] = useState(5);
          const [disabledOptions, setDisabledOptions] = useState([]); 
          const [selectedAns, setSelectedAns] = useState(null);
          const [isAnimating, setIsAnimating] = useState(false);
          const [feedback, setFeedback] = useState(null); 
          const [storyLevel, setStoryLevel] = useState(0);
          const [studentName, setStudentName] = useState('');
          const [studentClass, setStudentClass] = useState(''); 

          const startGame = () => {
            if (!studentName.trim() || !studentClass.trim()) { alert("Nhập Tên và Lớp nhé!"); return; }
            playSound('start');
            const shuffledQs = quizData.map(q => {
              const opts = q.options.map((text, idx) => ({ text, isCorrect: idx === q.a }));
              const shuffled = opts.sort(() => 0.5 - Math.random());
              return { q: q.q, options: shuffled.map(o => o.text), a: shuffled.findIndex(o => o.isCorrect) };
            }).sort(() => 0.5 - Math.random()); 
            setQuestions(shuffledQs); setCurrentQ(0); setScore(0); setLives(5); setHelps(5); setGameState('playing');
          };

          const handleAnswer = (index) => {
            if (isAnimating) return; setSelectedAns(index); setIsAnimating(true);
            const isCorrect = index === questions[currentQ].a;
            setFeedback(isCorrect ? 'correct' : 'wrong');
            if (isCorrect) { playSound('coin'); setScore(score + 10); } 
            else { playSound('wrong'); setLives(lives - 1); }
            setTimeout(() => {
              setFeedback(null); setIsAnimating(false); setSelectedAns(null); setDisabledOptions([]); 
              if (!isCorrect && lives <= 1) { setGameState('gameover'); return; }
              if (currentQ < questions.length - 1) {
                const nextQ = currentQ + 1;
                if (nextQ % 12 === 0) { setStoryLevel(nextQ / 12); setGameState('story'); } 
                else { setCurrentQ(nextQ); }
              } else { setGameState('end'); }
            }, 1500);
          };

          return (
            <div className="w-full max-w-4xl mx-auto h-[650px] flex flex-col relative overflow-hidden bg-[#5c94fc] rounded-2xl shadow-2xl border-[6px] border-gray-800 font-sans">
              {gameState === 'start' && (
                <div className="flex-1 flex flex-col items-center justify-center z-10 p-4 text-center">
                  <PrincessSVG width="100"/>
                  <h1 className="text-4xl font-black text-[#f8d070] my-4 drop-shadow-[2px_2px_0_#000]">MIEKO QUIZ - BÀI 53</h1>
                  <div className="bg-[#f8d070] p-6 rounded-xl border-4 border-[#c84c0c] mb-6 w-full max-w-md dialog-box">
                    <input type="text" placeholder="Tên của em" value={studentName} onChange={(e)=>setStudentName(e.target.value)} className="w-full p-3 mb-3 border-2 border-black rounded font-bold" />
                    <input type="text" placeholder="Lớp" value={studentClass} onChange={(e)=>setStudentClass(e.target.value)} className="w-full p-3 border-2 border-black rounded font-bold" />
                  </div>
                  <button onClick={startGame} className="px-10 py-4 bg-[#E52521] text-white font-black text-2xl rounded-xl game-btn border-4 border-red-950">BẮT ĐẦU</button>
                </div>
              )}

              {gameState === 'story' && (
                <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center text-white p-6 ${getStoryContent(storyLevel).bg}`}>
                  <div className="mb-6">{getStoryContent(storyLevel).icon}</div>
                  <h2 className="text-5xl font-black mb-4 text-yellow-400">{getStoryContent(storyLevel).title}</h2>
                  <p className="text-2xl font-bold mb-8">{getStoryContent(storyLevel).desc}</p>
                  <button onClick={()=>setGameState('playing')} className="px-8 py-4 bg-white text-black font-black rounded-xl">TIẾP TỤC</button>
                </div>
              )}

              {gameState === 'playing' && questions.length > 0 && (
                <>
                  <div className="flex justify-between p-4 bg-black/40 text-white font-bold z-20">
                    <span>MẠNG: {lives}</span>
                    <span>CÂU: {currentQ + 1}/{questions.length}</span>
                    <span>ĐIỂM: {score}</span>
                  </div>
                  <div className="flex-1 flex flex-col justify-center items-center z-20 p-4">
                    <div className="bg-[#f8d070] border-4 border-[#c84c0c] p-6 rounded-xl text-center w-full max-w-2xl mb-8">
                      <h2 className="text-2xl sm:text-3xl font-black leading-relaxed">{parseText(questions[currentQ].q)}</h2>
                    </div>
                    <div className="grid grid-cols-2 gap-4 w-full max-w-2xl">
                      {questions[currentQ].options.map((opt, i) => (
                        <button key={i} onClick={()=>handleAnswer(i)} className={`p-4 font-bold text-xl rounded-xl border-4 game-btn ${selectedAns===i ? (feedback==='correct'?'bg-green-500':'bg-red-500'):'bg-[#d27d2d] border-[#8b4513] text-white'}`}>
                          {parseText(opt, true)}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className={`absolute bottom-[110px] left-10 z-30 transition-all ${feedback==='correct'?'animate-mario-jump':''}`}>
                    <MarioSVG isSad={feedback==='wrong'}/>
                  </div>
                </>
              )}

              {(gameState === 'gameover' || gameState === 'end') && (
                <div className="flex-1 flex flex-col items-center justify-center z-50 text-white p-6 bg-black/80">
                   <h2 className="text-5xl font-black mb-4">{gameState==='end'?'CHIẾN THẮNG!':'GAME OVER'}</h2>
                   <p className="text-3xl mb-8">ĐIỂM CỦA {studentName.toUpperCase()}: {score}</p>
                   <button onClick={()=>window.location.reload()} className="px-8 py-4 bg-blue-600 rounded-xl font-black">CHƠI LẠI</button>
                </div>
              )}

              <div className="shrink-0 w-full h-[110px] bg-[#c84c0c] border-t-[10px] border-[#00a800] z-10"></div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarioQuiz />);
    </script>
</body>
</html>
